<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dart Manager | Tim Baum</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #c0392b; --dark: #1e272e; --accent: #f1c40f; }
        body { font-family: sans-serif; background: #2d3436; margin: 0; color: white; }
        header { background: #1e272e; padding: 20px; border-bottom: 3px solid var(--accent); text-align: center; }
        .container { max-width: 1100px; margin: 20px auto; padding: 10px; }
        #auth-container { max-width: 400px; margin: 50px auto; background: #34495e; padding: 30px; border-radius: 15px; border: 2px solid var(--accent); text-align: center; }
        input, select { padding: 10px; border-radius: 5px; border: none; margin: 5px; width: 90%; }
        button { padding: 10px 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; background: var(--primary); color: white; }
        .card { background: white; color: black; padding: 20px; border-radius: 10px; margin-top: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        .month-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; }
        label { font-size: 0.6rem; display: block; }
    </style>
</head>
<body>

<header><h1>DART-MANAGER</h1></header>

<div class="container">
    <div id="auth-container">
        <h3>LOGIN</h3>
        <input type="email" id="email" placeholder="E-Mail" value="tim.baum210690@gmail.com">
        <input type="password" id="password" placeholder="Passwort">
        <button id="loginBtn">EINLOGGEN</button>
    </div>

    <div id="app-content" style="display:none;">
        <div class="card">
            <h3>NEUER SPIELER</h3>
            <input type="text" id="playerName" placeholder="Name">
            <input type="date" id="playerBirth">
            <select id="playerSize">
                <option value="">Größe</option>
                <option value="S">S</option><option value="M">M</option><option value="L">L</option><option value="XL">XL</option>
            </select>
            <button onclick="addPlayer()">HINZUFÜGEN</button>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr><th>Name/Info</th><th>Felgen</th><th>Beitrag</th><th>X</th></tr>
                </thead>
                <tbody id="playerTableBody"></tbody>
            </table>
            <button onclick="firebase.auth().signOut()" style="background:grey; margin-top:10px;">Abmelden</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBMtWxbRPX4hBtBPi-Yn6uYt6I-ud5SyY8",
        authDomain: "mannschaftsmanager.firebaseapp.com",
        projectId: "mannschaftsmanager",
        storageBucket: "mannschaftsmanager.firebasestorage.app",
        messagingSenderId: "332675116491",
        appId: "1:332675116491:web:9e0097d48023fb123b5a4e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    document.getElementById('loginBtn').addEventListener('click', () => {
        auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value)
            .catch(err => alert(err.message));
    });

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            loadPlayers();
        } else {
            document.getElementById('auth-container').style.display = 'block';
document.getElementById('app-content').style.display = 'none';
        }
    });

    async function addPlayer() {
        const name = document.getElementById('playerName').value;
        if (!name) return;
        await db.collection("players").add({
            name: name, birth: document.getElementById('playerBirth').value, size: document.getElementById('playerSize').value,
            felgen: 0, months: new Array(12).fill(false), createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('playerName').value = "";
    }

    function loadPlayers() {
        db.collection("players").orderBy("createdAt", "asc").onSnapshot(snap => {
            const tbody = document.getElementById('playerTableBody');
            tbody.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data(); const id = doc.id;
                let mHtml = '<div class="month-grid">';
                const mons = ["J","F","M","A","M","J","J","A","S","O","N","D"];
                for(let i=0; i<12; i++) {
                    mHtml += <div><label>${mons[i]}</label><input type="checkbox" ${p.months && p.months[i] ? 'checked' : ''} onclick="toggleM('${id}',${i})"></div>;
                }
                mHtml += '</div>';

                tbody.innerHTML += `<tr>
                    <td><strong>${p.name}</strong><br><small>${p.birth||''} | ${p.size||''}</small></td>
                    <td><button onclick="updF('${id}',${p.felgen-1})">-</button> ${p.felgen} <button onclick="updF('${id}',${p.felgen+1})">+</button></td>
                    <td>${mHtml}</td>
                    <td><button onclick="delP('${id}')">X</button></td>
                </tr>`;
            });
        });
    }

    function updF(id, v) { if(v>=0) db.collection("players").doc(id).update({felgen:v}); }
    function delP(id) { if(confirm("Löschen?")) db.collection("players").doc(id).delete(); }
    async function toggleM(id, i) {
        const r = db.collection("players").doc(id);
        const d = await r.get();
        let m = d.data().months || new Array(12).fill(false);
        m[i] = !m[i]; r.update({months:m});
    }
</script>
</body>
</html>
