<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mannschaftsmanager | Dart</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #c0392b; --dark: #1e272e; --accent: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; background: #2d3436; margin: 0; color: white; }
        header { background: #1e272e; padding: 20px; border-bottom: 3px solid var(--accent); text-align: center; }
        .container { max-width: 1100px; margin: 20px auto; padding: 10px; }
        #auth-container { max-width: 400px; margin: 50px auto; background: #34495e; padding: 30px; border-radius: 15px; border: 2px solid var(--accent); text-align: center; }
        input, select { padding: 10px; border-radius: 5px; border: none; margin: 5px; width: 85%; box-sizing: border-box; }
        button { padding: 10px 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; background: var(--primary); color: white; }
        .card { background: white; color: black; padding: 20px; border-radius: 10px; margin-top: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; min-width: 600px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background: #f2f2f2; font-size: 0.8rem; }
        .month-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; }
        label { font-size: 0.6rem; display: block; }
    </style>
</head>
<body>

<header>
    <h1 style="color:var(--accent); margin:0;">DART-MANNSCHAFTSMANAGER</h1>
</header>

<div class="container">
    <div id="auth-container">
        <h3>LOGIN</h3>
        <input type="email" id="email" placeholder="E-Mail" value="tim.baum210690@gmail.com">
        <input type="password" id="password" placeholder="Passwort">
        <button id="loginBtn">EINLOGGEN</button>
    </div>

    <div id="app-content" style="display:none;">
        <div style="text-align:right; margin-bottom: 10px;">
            <button onclick="firebase.auth().signOut()" style="background:grey; padding: 5px 10px;">Abmelden</button>
        </div>

        <div class="card">
            <h3>NEUEN SPIELER HINZUFÜGEN</h3>
            <input type="text" id="playerName" placeholder="Vorname Nachname">
            <input type="date" id="playerBirth">
            <select id="playerSize">
                <option value="">Trikotgröße</option>
                <option value="S">S</option><option value="M">M</option><option value="L">L</option><option value="XL">XL</option><option value="XXL">XXL</option>
            </select>
            <button onclick="addPlayer()">HINZUFÜGEN</button>
        </div>

        <div class="card">
            <h3>SPIELERLISTE</h3>
            <table>
                <thead>
                    <tr>
                        <th>Name / Info</th>
                        <th>Felgen</th>
                        <th>Beitrag (Jan - Dez)</th>
                        <th>Aktion</th>
                    </tr>
                </thead>
                <tbody id="playerTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBMtWxbRPX4hBtBPi-Yn6uYt6I-ud5SyY8",
        authDomain: "mannschaftsmanager.firebaseapp.com",
        projectId: "mannschaftsmanager",
        storageBucket: "mannschaftsmanager.firebasestorage.app",
        messagingSenderId: "332675116491",
        appId: "1:332675116491:web:9e0097d48023fb123b5a4e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // Login (Exakt dein funktionierender Weg)
    document.getElementById('loginBtn').addEventListener('click', () => {
const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value;
        auth.signInWithEmailAndPassword(email, pass).catch(err => alert("Fehler: " + err.message));
    });

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            loadPlayers();
        } else {
            document.getElementById('auth-container').style.display = 'block';
            document.getElementById('app-content').style.display = 'none';
        }
    });

    async function addPlayer() {
        const name = document.getElementById('playerName').value;
        const birth = document.getElementById('playerBirth').value;
        const size = document.getElementById('playerSize').value;
        if (!name) return;
        try {
            await db.collection("players").add({
                name: name,
                birth: birth,
                size: size,
                felgen: 0,
                months: new Array(12).fill(false),
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('playerName').value = "";
            document.getElementById('playerBirth').value = "";
            document.getElementById('playerSize').value = "";
        } catch (e) { alert("Fehler: " + e.message); }
    }

    function loadPlayers() {
        db.collection("players").orderBy("createdAt", "asc").onSnapshot(snapshot => {
            const tbody = document.getElementById('playerTableBody');
            tbody.innerHTML = "";
            snapshot.forEach(doc => {
                const p = doc.data();
                const id = doc.id;
                const monate = ["J", "F", "M", "A", "M", "J", "J", "A", "S", "O", "N", "D"];
                
                let monthHtml = '<div class="month-grid">';
                for(let i=0; i<12; i++) {
                    monthHtml += `
                        <div>
                            <label>${monate[i]}</label>
                            <input type="checkbox" ${p.months && p.months[i] ? 'checked' : ''} 
                            onclick="toggleMonth('${id}', ${i})">
                        </div>`;
                }
                monthHtml += '</div>';

                tbody.innerHTML += `
                    <tr>
                        <td style="text-align:left;">
                            <strong>${p.name}</strong><br>
                            <small>${p.birth  '-'} | Gr: ${p.size  '-'}</small>
                        </td>
                        <td>
                            <button style="background:#e67e22;" onclick="updateFelgen('${id}', ${p.felgen - 1})">-</button>
                            <span style="font-weight:bold; margin:0 5px;">${p.felgen || 0}</span>
                            <button style="background:#27ae60;" onclick="updateFelgen('${id}', ${p.felgen + 1})">+</button>
                        </td>
                        <td>${monthHtml}</td>
                        <td><button style="background:#c0392b; padding:5px;" onclick="deletePlayer('${id}')">X</button></td>
                    </tr>
                `;
            });
        });
    }

    async function updateFelgen(id, val) {
        if(val < 0) val = 0;
        await db.collection("players").doc(id).update({ felgen: val });
    }

    async function toggleMonth(id, index) {
        const docRef = db.collection("players").doc(id);
        const doc = await docRef.get();
        let months = doc.data().months || new Array(12).fill(false);
        months[index] = !months[index];
        await docRef.update({ months: months });
    }

    async function deletePlayer(id) {
        if(confirm("Spieler löschen?")) await db.collection("players").doc(id).delete();
    }
</script>
</body>
</html>
