<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mannschaftsmanager | Dart-Freunde</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #c0392b; --dark: #1e272e; --accent: #f1c40f; --light: #f5f6fa; --success: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background: #2d3436; margin: 0; color: white; }
        header { background: #1e272e; padding: 15px; border-bottom: 4px solid var(--accent); text-align: center; }
        .logo-img { max-width: 120px; height: auto; }
        .container { max-width: 1200px; margin: 20px auto; padding: 10px; }
        
        /* Tabs */
        .tabs { display: flex; justify-content: center; gap: 5px; margin-bottom: 20px; }
        .tab-btn { background: #34495e; color: white; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; flex: 1; max-width: 200px; }
        .tab-btn.active { background: var(--light); color: var(--dark); border-bottom: 4px solid var(--accent); }
        .content-section { display: none; }
        .content-section.active { display: block; }

        /* Design */
        .card { background: white; color: #2d3436; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); overflow-x: auto; }
        h3 { margin-top: 0; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { background: #f1f2f6; padding: 10px; font-size: 0.8rem; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }

        /* Admin Felder */
        .admin-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 15px; }
        input, select { padding: 10px; border-radius: 5px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; }
        
        .month-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; }
        .month-item { font-size: 0.6rem; display: flex; flex-direction: column; align-items: center; }
        .month-item input { width: 16px; height: 16px; margin: 2px; }

        #auth-container { max-width: 400px; margin: 80px auto; background: #34495e; padding: 30px; border-radius: 15px; text-align: center; border: 2px solid var(--accent); }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="Logo" class="logo-img">
    <div style="color:var(--accent); font-weight:bold;">MANNSCHAFTS-PORTAL</div>
</header>

<div class="container">
    <div id="auth-container">
        <h2>LOGIN</h2>
        <input type="email" id="email" placeholder="E-Mail" value="tim.baum210690@gmail.com">
        <input type="password" id="password" placeholder="Passwort">
        <button id="loginBtn" style="margin-top:15px; background:var(--success); padding:12px; width:100%; border-radius:8px; border:none; color:white; font-weight:bold; cursor:pointer;">JETZT EINLOGGEN</button>
    </div>

    <div id="app-content" style="display:none;">
        <div class="tabs">
            <button id="btn-kader" class="tab-btn active" onclick="showTab('kader-tab')">KADER</button>
            <button id="btn-admin" class="tab-btn" onclick="showTab('admin-tab')">VERWALTUNG</button>
        </div>

        <div id="kader-tab" class="content-section active">
            <div class="card">
                <h3>MANNSCHAFTSÜBERSICHT</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Geburtstag</th>
                            <th>Trikot</th>
                            <th>Felgen</th>
                            <th>Beiträge</th>
</tr>
                    </thead>
                    <tbody id="viewTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="admin-tab" class="content-section">
            <div class="card">
                <h3>SPIELER ANLEGEN</h3>
                <div class="admin-inputs">
                    <input type="text" id="newName" placeholder="Name">
                    <input type="date" id="newBirth">
                    <select id="newSize">
                        <option value="">Größe</option>
                        <option value="S">S</option><option value="M">M</option><option value="L">L</option>
                        <option value="XL">XL</option><option value="XXL">XXL</option>
                    </select>
                    <button onclick="addPlayer()" style="background:var(--success); color:white; border:none; border-radius:5px; cursor:pointer;">Hinzufügen</button>
                </div>
            </div>
            <div class="card">
                <h3>DATEN VERWALTEN</h3>
                <div style="overflow-x:auto;">
                    <table id="adminTable">
                        <thead>
                            <tr><th>Spieler</th><th>Felgen</th><th>Jan-Dez</th><th>Aktion</th></tr>
                        </thead>
                        <tbody id="adminTableBody"></tbody>
                    </table>
                </div>
            </div>
            <button onclick="firebase.auth().signOut()" style="background:grey; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer; width:100%;">Abmelden</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBMtWxbRPX4hBtBPi-Yn6uYt6I-ud5SyY8",
        authDomain: "mannschaftsmanager.firebaseapp.com",
        projectId: "mannschaftsmanager",
        storageBucket: "mannschaftsmanager.firebasestorage.app",
        messagingSenderId: "332675116491",
        appId: "1:332675116491:web:9e0097d48023fb123b5a4e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // Login Logik mit Button-Feedback
    document.getElementById('loginBtn').addEventListener('click', () => {
        const btn = document.getElementById('loginBtn');
        btn.innerText = "PRÜFE...";
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value;
        
        auth.signInWithEmailAndPassword(email, pass)
            .then(() => { btn.innerText = "ERFOLG!"; })
            .catch(err => { 
                alert("Fehler: " + err.message); 
                btn.innerText = "JETZT EINLOGGEN";
            });
    });

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            syncData();
        } else {
            document.getElementById('auth-container').style.display = 'block';
            document.getElementById('app-content').style.display = 'none';
        }
    });

    function showTab(tabId) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        if(tabId === 'kader-tab') document.getElementById('btn-kader').classList.add('active');
        else document.getElementById('btn-admin').classList.add('active');
    }

    async function addPlayer() {
        const name = document.getElementById('newName').value;
        const birth = document.getElementById('newBirth').value;
        const size = document.getElementById('newSize').value;
        if (!name) return;
        await db.collection("players").add({
            name, birth, size,
            felgen: 0,
            months: new Array(12).fill(false),
            createdAt: firebase.
firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('newName').value = "";
    }

    function syncData() {
        db.collection("players").orderBy("createdAt", "asc").onSnapshot(snap => {
            const viewBody = document.getElementById('viewTableBody');
            const adminBody = document.getElementById('adminTableBody');
            viewBody.innerHTML = ""; adminBody.innerHTML = "";
            
            snap.forEach(doc => {
                const p = doc.data();
                const id = doc.id;
                const paid = (p.months || []).filter(m => m).length;

                // Kader Ansicht
                viewBody.innerHTML += `<tr>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.birth || '-'}</td>
                    <td>${p.size || '-'}</td>
                    <td style="color:red; font-weight:bold;">${p.felgen || 0}</td>
                    <td>${paid}/12 bezahlt</td>
                </tr>`;

                // Admin Ansicht
                let mHtml = '<div class="month-grid">';
                const mNames = ["J","F","M","A","M","J","J","A","S","O","N","D"];
                for(let i=0; i<12; i++) {
                    mHtml += <div class="month-item">${mNames[i]}<input type="checkbox" ${p.months && p.months[i]?'checked':''} onclick="toggleM('${id}',${i})"></div>;
                }
                mHtml += '</div>';

                adminBody.innerHTML += `<tr>
                    <td style="text-align:left;"><strong>${p.name}</strong><br><small>${p.birth||''} | Gr: ${p.size||''}</small></td>
                    <td><button onclick="updF('${id}',${(p.felgen||0)-1})">-</button> <strong>${p.felgen||0}</strong> <button onclick="updF('${id}',${(p.felgen||0)+1})">+</button></td>
                    <td>${mHtml}</td>
                    <td><button onclick="delP('${id}')" style="font-size:0.6rem;">LÖSCHEN</button></td>
                </tr>`;
            });
        });
    }

    async function updF(id, v) { if(v<0) v=0; await db.collection("players").doc(id).update({felgen: v}); }
    async function delP(id) { if(confirm("Spieler löschen?")) await db.collection("players").doc(id).delete(); }
    async function toggleM(id, idx) {
        const ref = db.collection("players").doc(id);
        const d = await ref.get();
        let m = d.data().months || new Array(12).fill(false);
        m[idx] = !m[idx];
        await ref.update({months: m});
    }
</script>
</body>
</html>
