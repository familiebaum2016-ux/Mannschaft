<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dart Manager</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --red: #c0392b; --dark: #1e272e; --gold: #f1c40f; }
        body { font-family: sans-serif; background: #2d3436; color: white; margin: 0; text-align: center; }
        header { background: var(--dark); padding: 10px; border-bottom: 3px solid var(--gold); }
        .container { max-width: 1000px; margin: auto; padding: 10px; }
        .card { background: white; color: black; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: left; overflow-x: auto; }
        input, select { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { padding: 12px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .btn-green { background: #27ae60; color: white; width: 100%; }
        .tabs { display: flex; margin-bottom: 15px; }
        .tab { flex: 1; padding: 10px; background: #34495e; color: white; cursor: pointer; border: none; }
        .tab.active { background: white; color: black; }
        .month-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; font-size: 0.6rem; }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="Logo" style="max-width:80px;"><br>
    <small id="status" style="color:var(--gold);">System wird geladen...</small>
</header>

<div class="container">
    <div id="login-box" style="max-width:350px; margin: 50px auto; background:#34495e; padding:20px; border-radius:10px;">
        <h3>LOGIN</h3>
        <input type="email" id="email" placeholder="E-Mail" value="tim.baum210690@gmail.com">
        <input type="password" id="pass" placeholder="Passwort">
        <button class="btn-green" onclick="startLogin()">EINLOGGEN</button>
    </div>

    <div id="main-app" style="display:none;">
        <div class="tabs">
            <button class="tab active" id="b1" onclick="showT('kader')">KADER</button>
            <button class="tab" id="b2" onclick="showT('admin')">VERWALTUNG</button>
        </div>

        <div id="tab-kader" style="display:block;">
            <div class="card">
                <table style="width:100%; border-collapse:collapse;">
                    <thead><tr><th>Name</th><th>Geb.</th><th>Gr.</th><th>Felgen</th></tr></thead>
                    <tbody id="viewBody"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-admin" style="display:none;">
            <div class="card">
                <h3>NEUER SPIELER</h3>
                <input type="text" id="nName" placeholder="Name">
                <input type="date" id="nBirth">
                <select id="nSize">
                    <option value="">Größe</option>
                    <option value="S">S</option><option value="M">M</option><option value="L">L</option><option value="XL">XL</option>
                </select>
                <button class="btn-green" onclick="addPlayer()">SPEICHERN</button>
            </div>
            <div class="card">
                <table style="width:100%; border-collapse:collapse;">
                    <thead><tr><th>Name</th><th>Felgen</th><th>Beitrag</th><th>X</th></tr></thead>
                    <tbody id="adminBody"></tbody>
                </table>
            </div>
            <button onclick="firebase.auth().signOut()" style="background:grey; color:white; width:100%;">Abmelden</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBMtWxbRPX4hBtBPi-Yn6uYt6I-ud5SyY8",
        authDomain: "mannschaftsmanager.firebaseapp.com",
        projectId: "mannschaftsmanager",
        storageBucket: "mannschaftsmanager.firebasestorage.app",
messagingSenderId: "332675116491",
        appId: "1:332675116491:web:9e0097d48023fb123b5a4e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    document.getElementById('status').innerText = "System bereit ✅";

    function startLogin() {
        const m = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        firebase.auth().signInWithEmailAndPassword(m, p)
            .catch(err => alert("FEHLER: " + err.message));
    }

    firebase.auth().onAuthStateChanged(user => {
        if(user) {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            loadData();
        } else {
            document.getElementById('login-box').style.display = 'block';
            document.getElementById('main-app').style.display = 'none';
        }
    });

    function showT(t) {
        document.getElementById('tab-kader').style.display = (t=='kader'?'block':'none');
        document.getElementById('tab-admin').style.display = (t=='admin'?'block':'none');
        document.getElementById('b1').className = (t=='kader'?'tab active':'tab');
        document.getElementById('b2').className = (t=='admin'?'tab active':'tab');
    }

    async function addPlayer() {
        const n = document.getElementById('nName').value;
        if(!n) return;
        await db.collection("players").add({
            name: n, birth: document.getElementById('nBirth').value,
            size: document.getElementById('nSize').value, felgen: 0,
            months: new Array(12).fill(false), createdAt: new Date()
        });
        document.getElementById('nName').value = "";
    }

    function loadData() {
        db.collection("players").orderBy("createdAt").onSnapshot(snap => {
            const vB = document.getElementById('viewBody');
            const aB = document.getElementById('adminBody');
            vB.innerHTML = ""; aB.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data(); const id = doc.id;
                vB.innerHTML += <tr><td>${p.name}</td><td>${p.birth||'-'}</td><td>${p.size||'-'}</td><td style="color:red">${p.felgen}</td></tr>;
                
                let mH = '<div class="month-grid">';
                for(let i=0; i<12; i++) {
                    mH += <div>${i+1}<input type="checkbox" ${p.months[i]?'checked':''} onclick="toggleM('${id}',${i})"></div>;
                }
                mH += '</div>';

                aB.innerHTML += `<tr><td>${p.name}</td>
                    <td><button onclick="updF('${id}',${p.felgen-1})">-</button> ${p.felgen} <button onclick="updF('${id}',${p.felgen+1})">+</button></td>
                    <td>${mH}</td><td><button onclick="delP('${id}')">X</button></td></tr>`;
            });
        });
    }

    function updF(id, v) { if(v>=0) db.collection("players").doc(id).update({felgen:v}); }
    function delP(id) { if(confirm("Löschen?")) db.collection("players").doc(id).delete(); }
    async function toggleM(id, i) {
        const r = db.collection("players").doc(id);
        const d = await r.get();
        let m = d.data().months; m[i] = !m[i];
        r.update({months:m});
    }
</script>
</body>
</html>
