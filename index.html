<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mannschaftsmanager | Dart-Freunde</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #c0392b; --dark: #1e272e; --accent: #f1c40f; --light: #f5f6fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #2d3436; margin: 0; color: white; }
        
        /* Header & Logo */
        header { background: #1e272e; padding: 20px; border-bottom: 4px solid var(--accent); text-align: center; }
        .logo-img { max-width: 180px; height: auto; margin-bottom: 10px; filter: drop-shadow(0 0 5px rgba(241, 196, 15, 0.3)); }
        
        .container { max-width: 1100px; margin: 20px auto; padding: 15px; }
        
        /* Login */
        #auth-container { max-width: 380px; margin: 60px auto; background: #34495e; padding: 40px; border-radius: 20px; border: 2px solid var(--accent); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { padding: 12px; border-radius: 8px; border: 1px solid #ccc; margin: 8px 0; width: 100%; box-sizing: border-box; font-size: 1rem; }
        button { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; background: var(--primary); color: white; transition: 0.3s; width: 100%; text-transform: uppercase; }
        button:hover { background: #e74c3c; transform: translateY(-2px); }
        
        /* App Content */
        .card { background: white; color: #2d3436; padding: 25px; border-radius: 15px; margin-top: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        h2, h3 { margin-top: 0; color: #2d3436; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        
        /* Tabelle */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; min-width: 700px; }
        th { background: #f1f2f6; padding: 12px; text-align: center; font-size: 0.85rem; color: #2f3542; border-bottom: 3px solid #dfe4ea; }
        td { padding: 15px 10px; border-bottom: 1px solid #eee; text-align: center; }
        
        /* Felgen-Zähler */
        .felgen-box { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .count-val { font-size: 1.5rem; font-weight: bold; min-width: 30px; color: var(--primary); }
        .btn-circle { width: 35px; height: 35px; border-radius: 50%; padding: 0; font-size: 1.2rem; width: auto; min-width: 35px; }
        
        /* Monats-Gitter */
        .month-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; }
        .month-item { display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; }
        .month-item input { width: 18px; height: 18px; margin: 2px 0; cursor: pointer; }

        .btn-del { background: #7f8c8d; width: auto; padding: 5px 10px; font-size: 0.7rem; }
        .btn-del:hover { background: #c0392b; }
        
        .add-player-box { display: flex; gap: 10px; margin-top: 10px; }
        .add-player-box input { flex: 1; margin: 0; }
        .add-player-box button { width: auto; }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="Dart-Freunde Logo" class="logo-img">
    <div style="color:var(--accent); font-weight:bold; letter-spacing: 2px;">MANNSCHAFTSMANAGER</div>
</header>

<div class="container">
    <div id="auth-container">
        <h2 style="color:white; border:none;">ZUGANG KADER</h2>
        <input type="email" id="email" placeholder="E-Mail" value="tim.baum210690@gmail.com">
        <input type="password" id="password" placeholder="Passwort">
        <button id="loginBtn">Einloggen</button>
    </div>

    <div id="app-content" style="display:none;">
<div style="display: flex; justify-content: space-between; align-items: center; background: #1e272e; padding: 10px 20px; border-radius: 10px; border-left: 5px solid var(--accent);">
            <span>Eingeloggt als: <strong id="userEmail" style="color:var(--accent);"></strong></span>
            <button onclick="firebase.auth().signOut()" style="background:transparent; border:1px solid #7f8c8d; width:auto; padding: 5px 15px; font-size: 0.8rem;">Logout</button>
        </div>

        <div class="card">
            <h3><span style="color:var(--primary)">+</span> SPIELER HINZUFÜGEN</h3>
            <div class="add-player-box">
                <input type="text" id="playerName" placeholder="Vorname Nachname">
                <button onclick="addPlayer()">Hinzufügen</button>
            </div>
        </div>

        <div class="card">
            <h3>AKTUELLER KADER</h3>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>SPIELER</th>
                            <th>FELGEN-WÜRFE</th>
                            <th>BEITRÄGE (JAN - DEZ)</th>
                            <th>AKTION</th>
                        </tr>
                    </thead>
                    <tbody id="playerTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBMtWxbRPX4hBtBPi-Yn6uYt6I-ud5SyY8",
        authDomain: "mannschaftsmanager.firebaseapp.com",
        projectId: "mannschaftsmanager",
        storageBucket: "mannschaftsmanager.firebasestorage.app",
        messagingSenderId: "332675116491",
        appId: "1:332675116491:web:9e0097d48023fb123b5a4e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    document.getElementById('loginBtn').addEventListener('click', () => {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value;
        auth.signInWithEmailAndPassword(email, pass).catch(err => alert("Fehler: " + err.message));
    });

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('userEmail').innerText = user.email;
            loadPlayers();
        } else {
            document.getElementById('auth-container').style.display = 'block';
            document.getElementById('app-content').style.display = 'none';
        }
    });

    async function addPlayer() {
        const name = document.getElementById('playerName').value;
        if (!name) return;
        await db.collection("players").add({
            name: name,
            felgen: 0,
            months: new Array(12).fill(false),
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('playerName').value = "";
    }

    function loadPlayers() {
        db.collection("players").orderBy("createdAt", "asc").onSnapshot(snapshot => {
            const tbody = document.getElementById('playerTableBody');
            tbody.innerHTML = "";
            snapshot.forEach(doc => {
                const p = doc.data();
                const id = doc.id;
                const monate = ["JAN", "FEB", "MÄR", "APR", "MAI", "JUN", "JUL", "AUG", "SEP", "OKT", "NOV", "DEZ"];
                
                let monthHtml = '<div class="month-grid">';
                for(let i=0; i<12; i++) {
                    monthHtml += `
                        <div class="month-item">
                            <label>${monate[i]}</label>
                            <input type="checkbox" ${p.months && p.months[i] ? 'checked' : ''} 
                            onclick="toggleMonth('${id}', ${i})">
                        </div>`;
                }
                monthHtml += '</div>';
tbody.innerHTML += `
                    <tr>
                        <td style="text-align:left;"><strong>${p.name}</strong></td>
                        <td>
                            <div class="felgen-box">
                                <button class="btn-circle btn-minus" onclick="updateFelgen('${id}', ${p.felgen - 1})">-</button>
                                <span class="count-val">${p.felgen || 0}</span>
                                <button class="btn-circle btn-plus" onclick="updateFelgen('${id}', ${p.felgen + 1})">+</button>
                            </div>
                        </td>
                        <td>${monthHtml}</td>
                        <td><button class="btn-del" onclick="deletePlayer('${id}')">Löschen</button></td>
                    </tr>
                `;
            });
        });
    }

    async function updateFelgen(id, val) {
        if(val < 0) val = 0;
        await db.collection("players").doc(id).update({ felgen: val });
    }

    async function toggleMonth(id, index) {
        const docRef = db.collection("players").doc(id);
        const doc = await docRef.get();
        let months = doc.data().months || new Array(12).fill(false);
        months[index] = !months[index];
        await docRef.update({ months: months });
    }

    async function deletePlayer(id) {
        if(confirm("Spieler "+id+" wirklich entfernen?")) await db.collection("players").doc(id).delete();
    }
</script>
</body>
</html>
