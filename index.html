<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dart Manager | Tim Baum</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #c0392b; --dark: #1e272e; --accent: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; background: #2d3436; margin: 0; color: white; }
        header { background: #1e272e; padding: 20px; border-bottom: 3px solid var(--accent); text-align: center; }
        .container { max-width: 1100px; margin: 20px auto; padding: 10px; }
        
        /* Login Box (Dein Original) */
        #auth-container { max-width: 400px; margin: 50px auto; background: #34495e; padding: 30px; border-radius: 15px; border: 2px solid var(--accent); text-align: center; }
        input, select { padding: 10px; border-radius: 5px; border: none; margin: 5px; width: 90%; box-sizing: border-box; }
        button { padding: 10px 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; background: var(--primary); color: white; }

        /* Navigation */
        .nav-tabs { display: flex; justify-content: center; margin-bottom: 20px; gap: 10px; }
        .nav-btn { background: #34495e; border: 1px solid var(--accent); flex: 1; max-width: 180px; }
        .nav-btn.active { background: var(--accent); color: black; }

        .card { background: white; color: black; padding: 20px; border-radius: 10px; margin-top: 10px; overflow-x: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; min-width: 600px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background: #f2f2f2; font-size: 0.8rem; }
        
        .month-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; }
        label { font-size: 0.6rem; display: block; }
    </style>
</head>
<body>

<header>
    <h1 style="color:var(--accent); margin:0;">DART-MANNSCHAFTSMANAGER</h1>
</header>

<div class="container">
    <div id="auth-container">
        <h3>LOGIN</h3>
        <input type="email" id="email" placeholder="E-Mail" value="tim.baum210690@gmail.com">
        <input type="password" id="password" placeholder="Passwort">
        <button id="loginBtn">EINLOGGEN</button>
    </div>

    <div id="app-content" style="display:none;">
        <div class="nav-tabs">
            <button id="btn-k" class="nav-btn active" onclick="changeTab('k')">KADER</button>
            <button id="btn-a" class="nav-btn" onclick="changeTab('a')">VERWALTUNG</button>
        </div>

        <div id="tab-kader">
            <div class="card">
                <h3 style="margin:0;">ÜBERSICHT</h3>
                <table>
                    <thead>
                        <tr><th>Name</th><th>Geburtstag</th><th>Größe</th><th>Felgen</th><th>Status</th></tr>
                    </thead>
                    <tbody id="kaderBody"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-admin" style="display:none;">
            <div class="card">
                <h3>SPIELER ANLEGEN</h3>
                <input type="text" id="addN" placeholder="Name">
                <input type="date" id="addB">
                <select id="addS">
                    <option value="">Größe</option>
                    <option value="S">S</option><option value="M">M</option><option value="L">L</option><option value="XL">XL</option>
                </select>
                <button onclick="savePlayer()">HINZUFÜGEN</button>
            </div>
            <div class="card">
                <h3>BEARBEITEN</h3>
                <table>
                    <thead>
                        <tr><th>Name</th><th>Felgen</th><th>Monate</th><th>Aktion</th></tr>
</thead>
                    <tbody id="adminBody"></tbody>
                </table>
            </div>
            <button onclick="firebase.auth().signOut()" style="background:grey; margin-top:20px;">Abmelden</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBMtWxbRPX4hBtBPi-Yn6uYt6I-ud5SyY8",
        authDomain: "mannschaftsmanager.firebaseapp.com",
        projectId: "mannschaftsmanager",
        storageBucket: "mannschaftsmanager.firebasestorage.app",
        messagingSenderId: "332675116491",
        appId: "1:332675116491:web:9e0097d48023fb123b5a4e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // Login (Exakt wie in deinem Original)
    document.getElementById('loginBtn').onclick = () => {
        const mail = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value;
        auth.signInWithEmailAndPassword(mail, pass).catch(e => alert(e.message));
    };

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            startSync();
        } else {
            document.getElementById('auth-container').style.display = 'block';
            document.getElementById('app-content').style.display = 'none';
        }
    });

    function changeTab(t) {
        document.getElementById('tab-kader').style.display = (t === 'k' ? 'block' : 'none');
        document.getElementById('tab-admin').style.display = (t === 'a' ? 'block' : 'none');
        document.getElementById('btn-k').className = (t === 'k' ? 'nav-btn active' : 'nav-btn');
        document.getElementById('btn-a').className = (t === 'a' ? 'nav-btn active' : 'nav-btn');
    }

    async function savePlayer() {
        const n = document.getElementById('addN').value;
        if (!n) return;
        await db.collection("players").add({
            name: n, birth: document.getElementById('addB').value,
            size: document.getElementById('addS').value,
            felgen: 0, months: new Array(12).fill(false),
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('addN').value = "";
    }

    function startSync() {
        db.collection("players").orderBy("createdAt", "asc").onSnapshot(snap => {
            const kB = document.getElementById('kaderBody');
            const aB = document.getElementById('adminBody');
            kB.innerHTML = ""; aB.innerHTML = "";
            
            snap.forEach(doc => {
                const p = doc.data();
                const id = doc.id;
                const m = p.months || new Array(12).fill(false);
                const paidCount = m.filter(v => v === true).length;

                // Kader Tabelle
                kB.innerHTML += <tr><td><strong>${p.name}</strong></td><td>${p.birth||'-'}</td><td>${p.size||'-'}</td><td style="color:red; font-weight:bold;">${p.felgen}</td><td>${paidCount}/12</td></tr>;

                // Admin Tabelle
                let mHtml = '<div class="month-grid">';
                const mons = ["J","F","M","A","M","J","J","A","S","O","N","D"];
                for(let i=0; i<12; i++) {
                    mHtml += <div><label>${mons[i]}</label><input type="checkbox" ${m[i]?'checked':''} onclick="toggleM('${id}',${i})"></div>;
                }
                mHtml += '</div>';

                aB.innerHTML += `<tr>
                    <td style="text-align:left;">${p.name}</td>
                    <td><button onclick="updF('${id}',${(p.felgen||0)-1})">-</button> ${p.felgen||0} <button onclick="updF('${id}',${(p.felgen||0)+1})">+</button></td>
                    <td>${mHtml}</td>
                    <td><button onclick="delP('${id}')">X</button></td>
                </tr>`;
            });
        });
    }

    async function updF(id, v) { if(v < 0) v = 0; await db.
collection("players").doc(id).update({felgen: v}); }
    async function delP(id) { if(confirm("Löschen?")) await db.collection("players").doc(id).delete(); }
    async function toggleM(id, i) {
        const ref = db.collection("players").doc(id);
        const d = await ref.get();
        let m = d.data().months || new Array(12).fill(false);
        m[i] = !m[i];
        await ref.update({months: m});
    }
</script>
</body>
</html>
