<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mannschaftsmanager | Dart-Freunde</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #c0392b; --dark: #1e272e; --accent: #f1c40f; --light: #f5f6fa; --success: #27ae60; }
        body { font-family: sans-serif; background: #2d3436; margin: 0; color: white; text-align: center; }
        header { background: #1e272e; padding: 15px; border-bottom: 4px solid var(--accent); }
        .logo-img { max-width: 120px; height: auto; }
        .container { max-width: 1100px; margin: 20px auto; padding: 10px; }
        
        /* Login Box */
        #auth-container { max-width: 350px; margin: 50px auto; background: #34495e; padding: 30px; border-radius: 15px; border: 2px solid var(--accent); }
        input, select { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; border-radius: 5px; border: none; }
        .btn-main { background: var(--success); color: white; padding: 12px; width: 100%; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Tabs */
        .tabs { display: flex; justify-content: center; margin-bottom: 20px; }
        .tab-btn { background: #34495e; color: white; padding: 12px; border: none; cursor: pointer; flex: 1; font-weight: bold; }
        .tab-btn.active { background: var(--light); color: var(--dark); }

        .content-section { display: none; text-align: left; }
        .content-section.active { display: block; }

        /* Tabellen */
        .card { background: white; color: black; padding: 15px; border-radius: 10px; margin-bottom: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 8px; border-bottom: 1px solid #ddd; text-align: center; }
        
        .month-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; }
        .month-item { font-size: 0.6rem; text-align: center; }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="Logo" class="logo-img">
    <div style="color:var(--accent); font-weight:bold;">MANNSCHAFTS-PORTAL</div>
</header>

<div class="container">
    <div id="auth-container">
        <h2 style="margin-top:0;">LOGIN</h2>
        <input type="email" id="email" placeholder="E-Mail" value="tim.baum210690@gmail.com">
        <input type="password" id="password" placeholder="Passwort">
        <button class="btn-main" onclick="handleLogin()">EINLOGGEN</button>
    </div>

    <div id="app-content" style="display:none;">
        <div class="tabs">
            <button id="t1" class="tab-btn active" onclick="switchTab('kader-tab', 't1')">KADER</button>
            <button id="t2" class="tab-btn" onclick="switchTab('admin-tab', 't2')">VERWALTUNG</button>
        </div>

        <div id="kader-tab" class="content-section active">
            <div class="card">
                <h3>MANNSCHAFTSÜBERSICHT</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Name</th><th>Geburtstag</th><th>Trikot</th><th>Felgen</th><th>Beitrag</th>
                        </tr>
                    </thead>
                    <tbody id="viewTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="admin-tab" class="content-section">
            <div class="card">
                <h3>SPIELER ANLEGEN</h3>
                <input type="text" id="newName" placeholder="Vorname Nachname">
                <input type="date" id="newBirth">
                <select id="newSize">
                    <option value="">Größe wählen</option>
                    <option value="S">S</option><option value="M">M</option><option value="L">L</option>
<option value="XL">XL</option><option value="XXL">XXL</option>
                </select>
                <button onclick="addPlayer()" style="background:var(--success); color:white; border:none; padding:10px; width:100%; border-radius:5px; margin-top:10px; cursor:pointer;">SPEICHERN</button>
            </div>

            <div class="card">
                <h3>BEARBEITEN</h3>
                <table id="adminTable">
                    <thead>
                        <tr><th>Spieler</th><th>Felgen</th><th>Monate</th><th>Aktion</th></tr>
                    </thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
            </div>
            <button onclick="firebase.auth().signOut()" style="background:grey; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer; width:100%;">ABMELDEN</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBMtWxbRPX4hBtBPi-Yn6uYt6I-ud5SyY8",
        authDomain: "mannschaftsmanager.firebaseapp.com",
        projectId: "mannschaftsmanager",
        storageBucket: "mannschaftsmanager.firebasestorage.app",
        messagingSenderId: "332675116491",
        appId: "1:332675116491:web:9e0097d48023fb123b5a4e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // Login Funktion
    function handleLogin() {
        const mail = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value;
        
        console.log("Versuche Login...");
        auth.signInWithEmailAndPassword(mail, pass)
            .then(() => { console.log("Login OK"); })
            .catch(err => { alert("Fehler: " + err.message); });
    }

    // Status Überprüfung
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            syncData();
        } else {
            document.getElementById('auth-container').style.display = 'block';
            document.getElementById('app-content').style.display = 'none';
        }
    });

    // Tab Wechsel
    function switchTab(sectionId, btnId) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(sectionId).classList.add('active');
        document.getElementById(btnId).classList.add('active');
    }

    // Spieler hinzufügen
    async function addPlayer() {
        const n = document.getElementById('newName').value;
        const b = document.getElementById('newBirth').value;
        const s = document.getElementById('newSize').value;
        if(!n) return alert("Name fehlt!");
        await db.collection("players").add({
            name: n, birth: b, size: s, felgen: 0,
            months: new Array(12).fill(false),
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('newName').value = "";
    }

    // Daten Synchronisation
    function syncData() {
        db.collection("players").orderBy("createdAt", "asc").onSnapshot(snap => {
            const vBody = document.getElementById('viewTableBody');
            const aBody = document.getElementById('adminTableBody');
            vBody.innerHTML = ""; aBody.innerHTML = "";

            snap.forEach(doc => {
                const p = doc.data();
                const id = doc.id;
                const paid = (p.months || []).filter(m => m).length;

                vBody.innerHTML += `<tr>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.birth || '-'}</td>
                    <td>${p.size || '-'}</td>
                    <td style="color:red; font-weight:bold;">${p.felgen || 0}</td>
                    <td>${paid}/12</td>
                </tr>`;
let mH = '<div class="month-grid">';
                const mN = ["J","F","M","A","M","J","J","A","S","O","N","D"];
                for(let i=0; i<12; i++) {
                    mH += <div class="month-item">${mN[i]}<input type="checkbox" ${p.months && p.months[i]?'checked':''} onclick="toggleM('${id}',${i})"></div>;
                }
                mH += '</div>';

                aBody.innerHTML += `<tr>
                    <td style="text-align:left;">${p.name}</td>
                    <td><button onclick="updF('${id}',${(p.felgen||0)-1})">-</button> ${p.felgen||0} <button onclick="updF('${id}',${(p.felgen||0)+1})">+</button></td>
                    <td>${mH}</td>
                    <td><button onclick="delP('${id}')">X</button></td>
                </tr>`;
            });
        });
    }

    async function updF(id, v) { if(v<0) v=0; await db.collection("players").doc(id).update({felgen:v}); }
    async function delP(id) { if(confirm("Löschen?")) await db.collection("players").doc(id).delete(); }
    async function toggleM(id, idx) {
        const ref = db.collection("players").doc(id);
        const d = await ref.get();
        let m = d.data().months || new Array(12).fill(false);
        m[idx] = !m[idx];
        await ref.update({months: m});
    }
</script>
</body>
</html>
