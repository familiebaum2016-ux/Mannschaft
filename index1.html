<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mannschaftsmanager | By Tim Baum</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #c0392b; --dark: #1e272e; --light: #ecf0f1; --accent: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; background: #2d3436; margin: 0; padding: 0; color: white; text-align: center; }
        header { background: #1e272e; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .logo-img { max-width: 250px; height: auto; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); margin-bottom: 10px; }
        h1 { color: var(--accent); margin: 5px 0; text-transform: uppercase; font-size: 1.8rem; }
        .credits { font-size: 0.8rem; color: #b2bec3; margin-bottom: 10px; }
        
        #auth-container { max-width: 400px; margin: 50px auto; background: #34495e; padding: 30px; border-radius: 15px; border: 2px solid var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #app-content { display: none; padding: 20px; max-width: 1000px; margin: 0 auto; }
        
        input { padding: 12px; border-radius: 8px; border: none; margin-bottom: 10px; width: 100%; box-sizing: border-box; font-size: 1rem; }
        button { padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; text-transform: uppercase; }
        .btn-main { background: var(--primary); color: white; }
        .btn-main:hover { background: #a93226; }
        
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-tab { padding: 10px 15px; cursor: pointer; background: #57606f; border-radius: 8px; color: white; font-weight: bold; }
        .nav-tab.active { background: var(--primary); }
        
        .container { background: white; padding: 25px; border-radius: 15px; color: #2d3436; display: none; text-align: left; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .container.active { display: block; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #eee; text-align: left; font-size: 0.9rem; }
        th { background: #f8f9fa; color: #7f8c8d; }
        
        .badge { padding: 3px 6px; border-radius: 4px; font-size: 0.7rem; background: #dfe6e9; margin: 1px; display: inline-block; font-weight: bold; }
        .badge.paid { background: #2ecc71; color: white; }
        
        .edit-card { background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #ddd; }
        .month-grid-edit { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 5px; }
        
        #logoutBtn { background: #ff7675; width: auto; padding: 5px 15px; font-size: 0.7rem; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="Logo" class="logo-img">
    <h1>Mannschaftsmanager</h1>
    <div class="credits">Entwickelt von <strong>Tim Baum</strong></div>
    <button onclick="logout()" id="logoutBtn" style="display:none;">Abmelden</button>
</header>

<div id="auth-container">
    <h2 id="auth-title">DART-FREUNDE ZUGANG</h2>
    <input type="email" id="email" placeholder="E-Mail">
    <input type="password" id="password" placeholder="Passwort">
    <button class="btn-main" onclick="handleAuth()">Login / Registrieren</button>
    <p style="font-size: 0.75rem; color: #b2bec3; margin-top: 15px;">Noch kein Konto? Einfach Daten eingeben und auf Registrieren klicken.</p>
</div>

<div id="app-content">
    <div class="nav-tabs">
        <div class="nav-tab active" onclick="showTab('add-tab', this)">SPIELER +</div>
<div id="kader-nav" class="nav-tab" onclick="showTab('kader-tab', this)">KADER</div>
        <div class="nav-tab" onclick="showTab('edit-tab', this)">BEARBEITEN</div>
    </div>

    <div id="add-tab" class="container active">
        <h3>Neuen Dart-Spieler hinzufügen</h3>
        <input type="text" id="pName" placeholder="Name des Spielers">
        <button class="btn-main" onclick="addPlayer()">Hinzufügen</button>
    </div>

    <div id="kader-tab" class="container">
        <h3>📋 Aktueller Kader</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr><th>Name</th><th>Monate bezahlt</th><th>Felgen</th><th>Geburtstag</th><th>Größe</th></tr>
                </thead>
                <tbody id="kaderBody"></tbody>
            </table>
        </div>
    </div>

    <div id="edit-tab" class="container">
        <h3>📝 Daten & Felgen verwalten</h3>
        <div id="editContainer"></div>
        <button class="btn-main" onclick="saveToCloud()" style="background:#2d3436; margin-top:20px;">Änderungen in Cloud speichern</button>
    </div>
</div>

<script>
    // --- DEINE FIREBASE DATEN (VOM FOTO) ---
    const firebaseConfig = {
        apiKey: "AIzaSyBDivWSuOeTQqZJVJQshWGIxM1xifbh9-kA",
        authDomain: "mannschaftsmanager.firebaseapp.com",
        projectId: "mannschaftsmanager",
        storageBucket: "mannschaftsmanager.firebasestorage.app",
        messagingSenderId: "332675116491",
        appId: "1:332675116491:web:9e0097d48023fb123b5a4e"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let players = [];
    const months = ["JAN", "FEB", "MÄR", "APR", "MAI", "JUN", "JUL", "AUG", "SEP", "OKT", "NOV", "DEZ"];

    // AUTH LOGIN LOGIK
    async function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        if(!email || !pass) return alert("Bitte E-Mail und Passwort eingeben!");
        try {
            await auth.signInWithEmailAndPassword(email, pass);
        } catch (e) {
            if(e.code === 'auth/user-not-found') {
                await auth.createUserWithEmailAndPassword(email, pass);
            } else { alert("Fehler: " + e.message); }
        }
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('logoutBtn').style.display = 'inline-block';
            loadData();
        } else {
            document.getElementById('auth-container').style.display = 'block';
            document.getElementById('app-content').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'none';
        }
    });

    function logout() { auth.signOut(); }

    // DATEN LADEN / SPEICHERN
    async function loadData() {
        const doc = await db.collection('users').doc(currentUser.uid).get();
        if(doc.exists) { players = doc.data().players || []; updateUI(); }
    }

    async function saveToCloud() {
        await db.collection('users').doc(currentUser.uid).set({ players });
        alert("Daten erfolgreich gesichert!");
        updateUI();
    }

    // SPIELER FUNKTIONEN
    function addPlayer() {
        const name = document.getElementById('pName').value.trim();
        if(!name) return;
        players.push({ id: Date.now(), name, monthsPaid: [], felgen: 0, birth: '', size: '' });
        document.getElementById('pName').value = '';
        saveToCloud();
    }

    function updateUI() { renderKader(); renderEdit(); }

    function renderKader() {
        const body = document.getElementById('kaderBody');
        body.innerHTML = players.map(p => `
            <tr>
                <td><strong>${p.name}</strong></td>
                <td>${months.map((m, i) => `<span class="badge ${p.
monthsPaid.includes(i) ? 'paid' : ''}">${m}</span>`).join('')}</td>
                <td style="color:#2ecc71; font-weight:bold;">${p.felgen}</td>
                <td>${p.birth || '-'}</td>
                <td>${p.size || '-'}</td>
            </tr>
        `).join('');
    }

    function renderEdit() {
        const container = document.getElementById('editContainer');
        container.innerHTML = players.map(p => `
            <div class="edit-card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <strong style="font-size:1.1rem; color:#c0392b;">${p.name}</strong>
                    <button onclick="delP(${p.id})" style="background:none; color:red; width:auto; font-size:0.8rem;">Löschen</button>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:10px;">
                    <div>
                        <small>Beiträge bezahlt:</small>
                        <div class="month-grid-edit">
                            ${months.map((m, i) => `<label style="font-size:0.65rem;"><input type="checkbox" ${p.monthsPaid.includes(i) ? 'checked' : ''} onchange="toggleM(${p.id}, ${i})"> ${m}</label>`).join('')}
                        </div>
                    </div>
                    <div>
                        <small>Felgenwürfe (+ Addieren):</small>
                        <div style="display:flex; gap:5px; margin-bottom:10px;">
                            <input type="number" id="fIn-${p.id}" placeholder="+Zahl" style="padding:5px; margin:0;">
                            <button onclick="addF(${p.id})" style="width:auto; padding:5px 10px; background:#2ecc71; color:white;">OK</button>
                        </div>
                        <input type="date" value="${p.birth}" onchange="updateF(${p.id}, 'birth', this.value)" style="padding:5px; font-size:0.8rem;">
                        <input type="text" value="${p.size}" onchange="updateF(${p.id}, 'size', this.value)" placeholder="Größe" style="padding:5px; font-size:0.8rem; margin-top:5px;">
                    </div>
                </div>
            </div>
        `).join('');
    }

    function toggleM(id, idx) {
        const p = players.find(p => p.id === id);
        const pos = p.monthsPaid.indexOf(idx);
        pos > -1 ? p.monthsPaid.splice(pos, 1) : p.monthsPaid.push(idx);
    }
    function addF(id) {
        const input = document.getElementById(`fIn-${id}`);
        const val = parseInt(input.value);
        if(!isNaN(val)) { players.find(p => p.id === id).felgen += val; input.value = ''; renderEdit(); }
    }
    function updateF(id, f, v) { players.find(p => p.id === id)[f] = v; }
    function delP(id) { if(confirm('Spieler wirklich löschen?')){ players = players.filter(p => p.id !== id); updateUI(); }}

    function showTab(tabId, el) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        el.classList.add('active');
        if(tabId === 'kader-tab') renderKader();
    }
</script>
</body>
</html>
